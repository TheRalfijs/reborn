<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RALFIJS REBORN</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E110D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ralfijs">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E110D;
    --panel: #171B14;
    --panel-2: #1D2218;
    --border: #2A3222;
    --border-bright: #4A5A34;
    --text: #E9E7DD;
    --muted: #8B9080;
    --accent: #9CB86B;
    --accent-dim: #6E8449;
    --warn: #D9A441;
    --danger: #C25B4A;
    --ok: #6FAE6B;
    --radius: 2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(156,184,107,0.06), transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(156,184,107,0.04), transparent 40%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .wrap{max-width: 720px; margin: 0 auto; padding: 18px 16px 40px;}

  /* ---- header / masthead ---- */
  .masthead{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom: 2px solid var(--border-bright);
    padding-bottom: 12px; margin-bottom: 18px;
  }
  .masthead h1{
    font-family:'Oswald', sans-serif; font-weight:700; letter-spacing: 3px;
    font-size: 22px; margin:0; color: var(--text);
  }
  .masthead .tag{
    font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
    letter-spacing: 1px; margin-top: 2px;
  }
  .datestamp{
    font-family:'JetBrains Mono', monospace; font-size: 12px; color: var(--muted);
    text-align:right;
  }

  /* ---- nav ---- */
  .nav{display:flex; gap:6px; margin-bottom:20px;}
  .nav button{
    flex:1; background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); font-family:'Oswald',sans-serif; letter-spacing:1px;
    font-size:12px; padding:9px 6px; cursor:pointer; text-transform:uppercase;
    border-radius: var(--radius);
  }
  .nav button.active{ color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight:600;}

  /* ---- briefing card (signature element) ---- */
  .briefing{
    position:relative;
    border: 1px solid var(--border-bright);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    padding: 18px 18px 16px;
    margin-bottom: 18px;
    border-radius: var(--radius);
  }
  .briefing::before, .briefing::after,
  .briefing .cbr::before, .briefing .cbr::after{
    content:""; position:absolute; width:12px; height:12px; border-color: var(--accent); border-style:solid; opacity:.8;
  }
  .briefing::before{ top:-1px; left:-1px; border-width:2px 0 0 2px; }
  .briefing::after{ top:-1px; right:-1px; border-width:2px 2px 0 0; }
  .briefing .cbr::before{ bottom:-1px; left:-1px; border-width:0 0 2px 2px; }
  .briefing .cbr::after{ bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
  .briefing .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom:6px;
  }
  .briefing h2{
    font-family:'Oswald', sans-serif; font-size: 26px; margin: 0 0 4px; letter-spacing:1px;
  }
  .briefing .sub{color: var(--muted); font-size: 13px; margin-bottom: 14px;}
  .progress-row{display:flex; align-items:center; gap:14px;}
  .progress-track{
    flex:1; height:10px; background: #0000004d; border:1px solid var(--border);
    border-radius: 4px; overflow:hidden;
  }
  .progress-fill{height:100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); transition: width .3s ease;}
  .progress-pct{font-family:'JetBrains Mono', monospace; font-weight:700; font-size:18px; min-width:52px; text-align:right;}

  /* ---- generic card/section ---- */
  .card{
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
  }
  .card h3{
    font-family:'Oswald', sans-serif; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent); margin: 0 0 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .card h3 .badge{
    font-family:'JetBrains Mono',monospace; font-size:10px; color: var(--muted);
    border:1px solid var(--border); padding:2px 6px; border-radius:3px; letter-spacing:0.5px;
  }

  /* checklist */
  .item{
    display:flex; align-items:center; gap:10px; padding:9px 4px;
    border-bottom: 1px solid var(--border);
  }
  .item:last-child{border-bottom:none;}
  .item input[type=checkbox]{
    appearance:none; width:19px; height:19px; min-width:19px; border:1px solid var(--border-bright);
    background: #0000004d; border-radius:3px; cursor:pointer; position:relative;
  }
  .item input[type=checkbox]:checked{ background: var(--accent); border-color: var(--accent); }
  .item input[type=checkbox]:checked::after{
    content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color: var(--bg); font-size:13px; font-weight:700;
  }
  .item label{flex:1; font-size:14px; cursor:pointer;}
  .item.done label{ color: var(--muted); text-decoration: line-through; }
  .item .meta{font-family:'JetBrains Mono',monospace; font-size:11px; color: var(--muted);}

  .mission-item label{ font-family:'Oswald', sans-serif; font-size:16px; letter-spacing:0.5px;}

  /* weigh-in */
  .weighin-banner{
    background: rgba(217,164,65,0.12); border:1px solid var(--warn); color: var(--warn);
    padding:10px 12px; border-radius: var(--radius); font-size:13px; margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .weight-row{display:flex; gap:8px; align-items:center;}
  .weight-row input[type=number]{
    background: #0000004d; border:1px solid var(--border-bright); color:var(--text);
    padding:8px 10px; border-radius:3px; width:110px; font-family:'JetBrains Mono',monospace; font-size:14px;
  }
  .btn{
    background: var(--accent); color: var(--bg); border:none; font-weight:700;
    font-family:'Oswald',sans-serif; letter-spacing:1px; text-transform:uppercase;
    font-size:12px; padding:9px 14px; border-radius:3px; cursor:pointer;
  }
  .btn.secondary{ background:transparent; color:var(--accent); border:1px solid var(--accent-dim); }
  .btn.danger{ background: var(--danger); color:#fff; }
  .btn:disabled{opacity:.4; cursor:default;}

  /* checkin form */
  .form-grid{display:grid; grid-template-columns: 1fr 1fr; gap:10px;}
  .form-grid .full{grid-column: 1 / -1;}
  .field label{display:block; font-size:11px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px;}
  .field input, .field textarea, .field select{
    width:100%; background:#0000004d; border:1px solid var(--border-bright); color:var(--text);
    padding:8px 9px; border-radius:3px; font-family:'Inter',sans-serif; font-size:13px;
  }
  .field textarea{resize:vertical; min-height:44px;}
  .checkin-done{
    background: rgba(111,174,107,0.1); border:1px solid var(--ok); color:var(--ok);
    padding:10px 12px; border-radius:var(--radius); font-size:13px;
  }

  /* stats */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{ text-align:left; padding:6px 4px; border-bottom:1px solid var(--border); }
  th{color:var(--muted); font-weight:500; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat-box{background:var(--panel-2); border:1px solid var(--border); padding:12px; border-radius:var(--radius);}
  .stat-box .num{font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700;}
  .stat-box .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px;}
  .delta-up{color:var(--ok);}
  .delta-down{color:var(--danger);}

  .settings-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row .lbl{font-size:13px;}
  .settings-row .desc{font-size:11px; color:var(--muted); margin-top:2px;}
  input[type=file]{display:none;}

  .empty{color:var(--muted); font-size:13px; text-align:center; padding:20px 0;}
  .footer-note{text-align:center; color:var(--border-bright); font-size:11px; margin-top:24px; font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div>
      <h1>RALFIJS REBORN</h1>
      <div class="tag">DAILY EXECUTION SYSTEM</div>
    </div>
    <div class="datestamp" id="datestamp"></div>
  </div>

  <div class="nav">
    <button data-tab="today" class="active">Šodien</button>
    <button data-tab="stats">Statistika</button>
    <button data-tab="settings">Iestatījumi</button>
  </div>

  <div id="tab-today"></div>
  <div id="tab-stats" style="display:none;"></div>
  <div id="tab-settings" style="display:none;"></div>

  <div class="footer-note">RALFIJS REBORN — LOKĀLI GLABĀTI DATI ŠAJĀ PĀRLŪKĀ</div>
</div>

<script>
/* =========================================================
   DATA / CONFIG
   ========================================================= */
const STORAGE_KEY = 'ralfijsRebornData_v1';

const DAY_TYPES = {
  1: { name:'Pirmdiena', title:'Bāzes disciplīnas diena', weighIn:false,
       mission:'Sākt nedēļu ar pilnu disciplīni — bez izņēmumiem',
       tasks:['Atspiešanās','Preses treniņš','RalfijsWEB klientu uzrunas','Tēriņu pieraksts','Ģimenes laiks','Sagatavošanās nākamajai dienai'] },
  2: { name:'Otrdiena', title:'Spēka diena', weighIn:true,
       mission:'Izpildīt spēka treniņu',
       tasks:['Spēka treniņš','RalfijsWEB follow-up','Finanšu kontrole','Atsildīšanās','Nākamās dienas sagatavošana','Svēršanās'] },
  3: { name:'Trešdiena', title:'Skriešanas diena', weighIn:false,
       mission:'Izpildīt skriešanas treniņu',
       tasks:['Skriešana vai intervāli','Mobilitāte','RalfijsWEB darba bloks','Tēriņu kontrole','Ģimenes laiks'] },
  4: { name:'Ceturtdiena', title:'Spēka diena', weighIn:false,
       mission:'Izpildīt otro nedēļas spēka treniņu',
       tasks:['Otrais nedēļas spēka treniņš','RalfijsWEB satura izveide','Finanšu kontrole','Atjaunošanās','Dienas noslēgšana'] },
  5: { name:'Piektdiena', title:'Izpildes diena', weighIn:false,
       mission:'Pabeigt vienu konkrētu RalfijsWEB rezultātu',
       tasks:['Viegls fiziskais treniņš','Viens gatavs RalfijsWEB rezultāts','Ģimenes laiks','Sagatavošanās sestdienas dežūrai'] },
  6: { name:'Sestdiena', title:'24 stundu dežūras minimums', weighIn:true,
       mission:'Noturēt minimumu dežūras laikā',
       tasks:['Ierasties sagatavotam','Paņemt ēdienu un ūdeni','Īsa kustība, ja iespējams','Pierakstīt vienu biznesa ideju','Reģistrēt tēriņus','Īss check-in','Svēršanās'] },
  0: { name:'Svētdiena', title:'Atjaunošanās diena', weighIn:false,
       mission:'Atjaunoties un sagatavoties nākamajai nedēļai',
       tasks:['Pastaiga','Mobilitāte','Meal Prep','Ģimenes laiks','Neliels RalfijsWEB uzdevums','Tēriņu kontrole','Sagatavošanās pirmdienai'] },
};

const NUTRITION_ITEMS = [
  {key:'breakfast', label:'Brokastis apēstas'},
  {key:'lunch', label:'Pusdienas apēstas'},
  {key:'dinner', label:'Vakariņas apēstas'},
  {key:'extra', label:'Papildus ēdienreize apēsta'},
  {key:'water', label:'Izdzerti vismaz 2 litri ūdens'},
];

const CHECKIN_FIELDS = [
  {key:'discipline', label:'Disciplīnas vērtējums (1-10)', type:'number', min:1,max:10},
  {key:'energy', label:'Enerģijas līmenis (1-10)', type:'number', min:1,max:10},
  {key:'mood', label:'Noskaņojums (1-10)', type:'number', min:1,max:10},
  {key:'sleep', label:'Miega stundas', type:'number', min:0,max:14, step:0.5},
  {key:'webMinutes', label:'RalfijsWEB darba minūtes', type:'number', min:0},
  {key:'spending', label:'Šodienas tēriņi (€)', type:'number', min:0, step:0.01},
  {key:'win', label:'Lielākā uzvara', type:'text', full:true},
  {key:'blocker', label:'Kas traucēja', type:'text', full:true},
];

/* =========================================================
   STATE
   ========================================================= */
function todayISO(d=new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function defaultState(){
  return { startDate: todayISO(), logs: {}, weights: [] };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if(!parsed.startDate) parsed.startDate = todayISO();
    if(!parsed.logs) parsed.logs = {};
    if(!parsed.weights) parsed.weights = [];
    return parsed;
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();

function getLog(dateStr){
  if(!state.logs[dateStr]){
    state.logs[dateStr] = {
      tasks:{}, mission:false,
      nutrition:{breakfast:false,lunch:false,dinner:false,extra:false,water:false},
      checkin:null, weight:null
    };
  }
  return state.logs[dateStr];
}

/* =========================================================
   NUTRITION PHASE LOGIC
   ========================================================= */
function daysBetween(a,b){
  const d1 = new Date(a+'T00:00:00');
  const d2 = new Date(b+'T00:00:00');
  return Math.round((d2-d1)/86400000);
}
function getPhase(dateStr){
  let days = daysBetween(state.startDate, dateStr);
  if(days<0) days = 0;
  if(days<7)  return {phase:1,label:'1. nedēļa — adaptācija',kcal:'1900–2100 kcal',oats:80,rice:100,pasta:100,extra:null,day:days+1,totalDays:7};
  if(days<14) return {phase:2,label:'2. nedēļa — adaptācija',kcal:'2200–2400 kcal',oats:100,rice:130,pasta:130,extra:null,day:days-7+1,totalDays:7};
  if(days<21) return {phase:3,label:'3. nedēļa — adaptācija',kcal:'2500–2700 kcal',oats:100,rice:130,pasta:130,extra:'2 olas vai 200g biezpiena',day:days-14+1,totalDays:7};
  return {phase:4,label:'Pilns masas pieauguma režīms',kcal:'2500–2700+ kcal',oats:110,rice:150,pasta:150,extra:'2 olas vai 200g biezpiena',day:days-21+1,totalDays:null};
}
function buildMeals(phase){
  return {
    breakfast: `${phase.oats}g auzu pārslu, 250ml piena, 1 banāns`,
    lunch: `Vistas fileja, ${phase.rice}g sauso rīsu, dārzeņi, olīveļļa`,
    dinner: `Maltā liellopa gaļa, ${phase.pasta}g sauso makaronu, dārzeņi, biezpiens pēc apetītes`,
    extra: phase.extra ? phase.extra : 'Pēc izvēles — olas vai biezpiens',
    water: 'Vismaz 2 litri ūdens'
  };
}

/* =========================================================
   RENDER: TODAY
   ========================================================= */
function renderToday(){
  const now = new Date();
  const dateStr = todayISO(now);
  const dow = now.getDay();
  const dayCfg = DAY_TYPES[dow];
  const log = getLog(dateStr);
  const phase = getPhase(dateStr);
  const meals = buildMeals(phase);

  // progress calc
  const taskKeys = dayCfg.tasks.map((_,i)=>String(i));
  const tasksDone = taskKeys.filter(k=>log.tasks[k]).length;
  const nutritionDone = NUTRITION_ITEMS.filter(n=>log.nutrition[n.key]).length;
  const totalItems = taskKeys.length + 1 + NUTRITION_ITEMS.length + 1; // +mission +checkin
  const doneItems = tasksDone + (log.mission?1:0) + nutritionDone + (log.checkin?1:0);
  const pct = totalItems ? Math.round(doneItems/totalItems*100) : 0;

  const weighInNeeded = dayCfg.weighIn && now.getHours()>=7 && log.weight===null;

  let html = '';

  html += `<div class="briefing"><div class="cbr"></div>
    <div class="eyebrow">Operācija — ${dayCfg.name.toUpperCase()}</div>
    <h2>${dayCfg.title}</h2>
    <div class="sub">${phase.label}${phase.totalDays? ` · diena ${phase.day}/${phase.totalDays}`:''} · mērķis: ${phase.kcal}</div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-pct">${pct}%</div>
    </div>
  </div>`;

  if(weighInNeeded){
    html += `<div class="weighin-banner">⚠ Šodien ir svēršanās diena. Ievadi savu svaru zemāk.</div>`;
  }

  // Mission
  html += `<div class="card"><h3>Šodienas galvenā misija</h3>
    <div class="item mission-item ${log.mission?'done':''}">
      <input type="checkbox" id="mission-cb" ${log.mission?'checked':''}>
      <label for="mission-cb">${dayCfg.mission}</label>
    </div></div>`;

  // Tasks
  html += `<div class="card"><h3>Šodienas uzdevumi <span class="badge">${tasksDone}/${taskKeys.length}</span></h3>`;
  dayCfg.tasks.forEach((t,i)=>{
    const checked = !!log.tasks[String(i)];
    html += `<div class="item ${checked?'done':''}">
      <input type="checkbox" class="task-cb" data-idx="${i}" ${checked?'checked':''}>
      <label data-idx="${i}" class="task-label">${t}</label>
    </div>`;
  });
  html += `</div>`;

  // Nutrition
  html += `<div class="card"><h3>Šodienas uzturs <span class="badge">${nutritionDone}/${NUTRITION_ITEMS.length}</span></h3>`;
  NUTRITION_ITEMS.forEach(n=>{
    const checked = !!log.nutrition[n.key];
    html += `<div class="item ${checked?'done':''}">
      <input type="checkbox" class="nutri-cb" data-key="${n.key}" ${checked?'checked':''}>
      <label class="nutri-label" data-key="${n.key}">${n.label}</label>
      <span class="meta">${meals[n.key]}</span>
    </div>`;
  });
  html += `</div>`;

  // Weigh-in
  html += `<div class="card"><h3>Svēršanās ${dayCfg.weighIn?'<span class="badge">ŠODIEN</span>':''}</h3>
    <div class="weight-row">
      <input type="number" step="0.1" id="weight-input" placeholder="kg" value="${log.weight!==null?log.weight:''}">
      <button class="btn" id="save-weight-btn">Saglabāt</button>
    </div>
  </div>`;

  // Evening check-in
  html += `<div class="card"><h3>Vakara check-in</h3>`;
  if(log.checkin){
    html += `<div class="checkin-done">✓ Diena noslēgta. Disciplīna: ${log.checkin.discipline ?? '—'}/10, Enerģija: ${log.checkin.energy ?? '—'}/10, Miegs: ${log.checkin.sleep ?? '—'}h</div>
      <div style="margin-top:10px;"><button class="btn secondary" id="edit-checkin-btn">Rediģēt</button></div>`;
  } else {
    html += `<div class="form-grid" id="checkin-form">`;
    CHECKIN_FIELDS.forEach(f=>{
      html += `<div class="field ${f.full?'full':''}">
        <label>${f.label}</label>
        <input type="${f.type}" data-key="${f.key}" ${f.min!==undefined?`min="${f.min}"`:''} ${f.max!==undefined?`max="${f.max}"`:''} ${f.step?`step="${f.step}"`:''}>
      </div>`;
    });
    html += `</div><div style="margin-top:12px;"><button class="btn" id="save-checkin-btn">Saglabāt un noslēgt dienu</button></div>`;
  }
  html += `</div>`;

  document.getElementById('tab-today').innerHTML = html;
  wireTodayEvents(dateStr, dayCfg, taskKeys);
}

function wireTodayEvents(dateStr, dayCfg, taskKeys){
  const log = getLog(dateStr);

  document.getElementById('mission-cb').addEventListener('change', e=>{
    log.mission = e.target.checked; saveState(); renderToday();
  });

  document.querySelectorAll('.task-cb').forEach(cb=>{
    cb.addEventListener('change', e=>{
      log.tasks[e.target.dataset.idx] = e.target.checked; saveState(); renderToday();
    });
  });
  document.querySelectorAll('.task-label').forEach(l=>{
    l.addEventListener('click', ()=>{
      const idx = l.dataset.idx;
      log.tasks[idx] = !log.tasks[idx]; saveState(); renderToday();
    });
  });

  document.querySelectorAll('.nutri-cb').forEach(cb=>{
    cb.addEventListener('change', e=>{
      log.nutrition[e.target.dataset.key] = e.target.checked; saveState(); renderToday();
    });
  });
  document.querySelectorAll('.nutri-label').forEach(l=>{
    l.addEventListener('click', ()=>{
      const key = l.dataset.key;
      log.nutrition[key] = !log.nutrition[key]; saveState(); renderToday();
    });
  });

  document.getElementById('save-weight-btn').addEventListener('click', ()=>{
    const val = parseFloat(document.getElementById('weight-input').value);
    if(isNaN(val) || val<=0){ alert('Ievadi derīgu svaru.'); return; }
    log.weight = val;
    const existingIdx = state.weights.findIndex(w=>w.date===dateStr);
    if(existingIdx>=0) state.weights[existingIdx].weight = val;
    else state.weights.push({date:dateStr, weight:val});
    state.weights.sort((a,b)=>a.date.localeCompare(b.date));
    saveState(); renderToday();
  });

  const editBtn = document.getElementById('edit-checkin-btn');
  if(editBtn){
    editBtn.addEventListener('click', ()=>{ log.checkin = null; saveState(); renderToday(); });
  }
  const saveCheckinBtn = document.getElementById('save-checkin-btn');
  if(saveCheckinBtn){
    saveCheckinBtn.addEventListener('click', ()=>{
      const data = {};
      document.querySelectorAll('#checkin-form [data-key]').forEach(inp=>{
        data[inp.dataset.key] = inp.type==='number' ? (inp.value===''?null:parseFloat(inp.value)) : inp.value;
      });
      log.checkin = data;
      saveState(); renderToday();
    });
  }
}

/* =========================================================
   RENDER: STATS
   ========================================================= */
function monthKey(dateStr){ return dateStr.slice(0,7); }

function avgExecutionForMonth(ym){
  const dates = Object.keys(state.logs).filter(d=>monthKey(d)===ym);
  if(!dates.length) return null;
  let sum=0, count=0;
  dates.forEach(d=>{
    const dow = new Date(d+'T00:00:00').getDay();
    const cfg = DAY_TYPES[dow];
    const log = state.logs[d];
    const taskKeys = cfg.tasks.map((_,i)=>String(i));
    const tasksDone = taskKeys.filter(k=>log.tasks[k]).length;
    const nutritionDone = NUTRITION_ITEMS.filter(n=>log.nutrition[n.key]).length;
    const total = taskKeys.length + 1 + NUTRITION_ITEMS.length + 1;
    const done = tasksDone + (log.mission?1:0) + nutritionDone + (log.checkin?1:0);
    if(total>0){ sum += done/total*100; count++; }
  });
  return count ? Math.round(sum/count) : null;
}

function renderStats(){
  const now = new Date();
  const thisYm = monthKey(todayISO(now));
  const prevDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevYm = monthKey(todayISO(prevDate));

  const curAvg = avgExecutionForMonth(thisYm);
  const prevAvg = avgExecutionForMonth(prevYm);
  let trendHtml = '';
  if(curAvg!==null && prevAvg!==null){
    const diff = curAvg - prevAvg;
    trendHtml = `<span class="${diff>=0?'delta-up':'delta-down'}">${diff>=0?'+':''}${diff}% pret iepr. mēnesi</span>`;
  }

  const weights = state.weights;
  const lastWeight = weights.length ? weights[weights.length-1] : null;
  const firstWeight = weights.length ? weights[0] : null;
  let weightDeltaHtml = '—';
  if(lastWeight && firstWeight && weights.length>1){
    const d = (lastWeight.weight - firstWeight.weight).toFixed(1);
    weightDeltaHtml = `<span class="${d>=0?'delta-up':'delta-down'}">${d>=0?'+':''}${d} kg kopš sākuma</span>`;
  }

  const monthWeighins = weights.filter(w=>monthKey(w.date)===thisYm).length;

  let html = `<div class="stat-grid">
    <div class="stat-box"><div class="num">${curAvg!==null?curAvg+'%':'—'}</div><div class="lbl">Šī mēneša izpilde</div></div>
    <div class="stat-box"><div class="num">${lastWeight?lastWeight.weight+' kg':'—'}</div><div class="lbl">Pēdējais svars</div></div>
  </div>
  <div class="card"><h3>Ikmēneša tendence</h3><div style="font-size:13px;">${trendHtml || 'Nav pietiekami datu salīdzināšanai.'}</div></div>
  <div class="card"><h3>Svara dinamika</h3>
    <div style="margin-bottom:8px; font-size:13px;">${weightDeltaHtml}</div>
    <div style="margin-bottom:10px; font-size:12px; color:var(--muted);">Svēršanās šomēnes: ${monthWeighins}</div>`;

  if(weights.length){
    html += `<table><tr><th>Datums</th><th>Svars</th></tr>`;
    weights.slice().reverse().slice(0,15).forEach(w=>{
      html += `<tr><td>${w.date}</td><td>${w.weight} kg</td></tr>`;
    });
    html += `</table>`;
  } else {
    html += `<div class="empty">Vēl nav svēršanās ierakstu.</div>`;
  }
  html += `</div>`;

  // execution history (last 14 logged days)
  const loggedDates = Object.keys(state.logs).sort().reverse().slice(0,14);
  html += `<div class="card"><h3>Pēdējās dienas</h3>`;
  if(loggedDates.length){
    html += `<table><tr><th>Datums</th><th>Diena</th><th>Izpilde</th></tr>`;
    loggedDates.forEach(d=>{
      const dow = new Date(d+'T00:00:00').getDay();
      const cfg = DAY_TYPES[dow];
      const log = state.logs[d];
      const taskKeys = cfg.tasks.map((_,i)=>String(i));
      const tasksDone = taskKeys.filter(k=>log.tasks[k]).length;
      const nutritionDone = NUTRITION_ITEMS.filter(n=>log.nutrition[n.key]).length;
      const total = taskKeys.length + 1 + NUTRITION_ITEMS.length + 1;
      const done = tasksDone + (log.mission?1:0) + nutritionDone + (log.checkin?1:0);
      const p = total?Math.round(done/total*100):0;
      html += `<tr><td>${d}</td><td>${cfg.name}</td><td>${p}%</td></tr>`;
    });
    html += `</table>`;
  } else {
    html += `<div class="empty">Vēl nav ierakstu.</div>`;
  }
  html += `</div>`;

  document.getElementById('tab-stats').innerHTML = html;
}

/* =========================================================
   RENDER: SETTINGS
   ========================================================= */
function renderSettings(){
  let html = `<div class="card"><h3>Uztura adaptācijas sākuma datums</h3>
    <div class="settings-row">
      <div>
        <div class="lbl">Sākuma datums</div>
        <div class="desc">Nosaka, kurā uztura fāzē pašlaik atrodies</div>
      </div>
      <input type="date" id="start-date-input" value="${state.startDate}">
    </div>
    <div style="margin-top:10px; text-align:right;"><button class="btn" id="save-start-date-btn">Saglabāt</button></div>
  </div>`;

  html += `<div class="card"><h3>Dati un rezerves kopija</h3>
    <div class="settings-row">
      <div><div class="lbl">Eksportēt datus</div><div class="desc">Lejupielādē visus datus kā JSON failu</div></div>
      <button class="btn secondary" id="export-btn">Eksportēt</button>
    </div>
    <div class="settings-row">
      <div><div class="lbl">Importēt datus</div><div class="desc">Atjauno datus no iepriekš eksportēta faila</div></div>
      <button class="btn secondary" id="import-btn">Importēt</button>
      <input type="file" id="import-file" accept="application/json">
    </div>
    <div class="settings-row">
      <div><div class="lbl">Dzēst visus datus</div><div class="desc">Neatgriezeniski notīra visu vēsturi</div></div>
      <button class="btn danger" id="reset-btn">Dzēst</button>
    </div>
  </div>`;

  document.getElementById('tab-settings').innerHTML = html;

  document.getElementById('save-start-date-btn').addEventListener('click', ()=>{
    const val = document.getElementById('start-date-input').value;
    if(val){ state.startDate = val; saveState(); renderAll(); alert('Saglabāts.'); }
  });

  document.getElementById('export-btn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ralfijs-reborn-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('import-btn').addEventListener('click', ()=>{
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const imported = JSON.parse(ev.target.result);
        if(!imported.logs || !imported.startDate){ alert('Nederīgs faila formāts.'); return; }
        state = imported;
        saveState(); renderAll();
        alert('Dati importēti.');
      }catch(err){ alert('Kļūda ielasot failu.'); }
    };
    reader.readAsText(file);
  });

  document.getElementById('reset-btn').addEventListener('click', ()=>{
    if(confirm('Vai tiešām dzēst visus datus? Šo darbību nevar atsaukt.')){
      state = defaultState();
      saveState(); renderAll();
    }
  });
}

/* =========================================================
   NAV / INIT
   ========================================================= */
function renderAll(){
  renderToday();
  renderStats();
  renderSettings();
}

document.querySelectorAll('.nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['today','stats','settings'].forEach(t=>{
      document.getElementById('tab-'+t).style.display = (t===btn.dataset.tab)?'block':'none';
    });
  });
});

function updateDatestamp(){
  const now = new Date();
  const dow = DAY_TYPES[now.getDay()].name;
  const opts = {day:'2-digit',month:'2-digit',year:'numeric'};
  document.getElementById('datestamp').textContent = `${dow.toUpperCase()} · ${now.toLocaleDateString('lv-LV',opts)}`;
}

updateDatestamp();
renderAll();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

</script>
</body>
</html>
